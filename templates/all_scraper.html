<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Nexus | Deep Extraction</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-darker: #020406;
            --bg-panel: rgba(10, 15, 25, 0.8);
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --border-color: rgba(0, 242, 255, 0.2);
            --text-main: #e0faff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-darker);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- STARRY/DATA BACKGROUND --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #020406 100%);
            z-index: -2;
        }

        /* --- SCANLINE ANIMATION --- */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 242, 255, 0) 0%, rgba(0, 242, 255, 0.05) 50%, rgba(0, 242, 255, 0) 100%);
            opacity: 0.1;
            position: fixed;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        /* --- NAVIGATION / HEADER --- */
        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 4, 6, 0.9);
            backdrop-filter: blur(10px);
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- INPUT HUD --- */
        .hud-container {
            max-width: 1200px;
            width: 95%;
            margin: 40px auto;
        }

        .input-group {
            display: flex;
            background: var(--bg-panel);
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            gap: 10px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--neon-blue);
            padding: 15px;
            font-size: 1rem;
            outline: none;
        }

        .btn-initiate {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 0 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .btn-initiate:hover {
            background: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
            transform: translateY(-2px);
        }

        /* --- MAIN RESULTS DASHBOARD --- */
        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-top: 20px;
            height: 600px;
        }

        .side-panel, .main-view {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        .panel-label {
            position: absolute;
            top: 0; right: 0;
            font-size: 0.6rem;
            padding: 4px 8px;
            background: var(--border-color);
            color: var(--neon-blue);
            text-transform: uppercase;
        }

        h2 {
            font-size: 0.9rem;
            color: var(--neon-green);
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(57, 255, 20, 0.2);
            padding-bottom: 5px;
        }

        .data-item {
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .label { color: var(--neon-blue); opacity: 0.7; }

        /* --- IMAGE STREAM --- */
        .image-stream {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .image-stream img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            filter: grayscale(100%) brightness(0.8);
            transition: 0.3s;
        }

        .image-stream img:hover {
            filter: grayscale(0%) brightness(1);
            border-color: var(--neon-blue);
            transform: scale(1.05);
        }

        /* --- CONSOLE LOG --- */
        .console-log {
            margin-top: 20px;
            background: #000;
            border: 1px solid #111;
            padding: 15px;
            font-size: 0.75rem;
            color: #555;
            height: 100px;
            overflow-y: auto;
        }

        .log-entry.success { color: var(--neon-green); }
        .log-entry.process { color: var(--neon-blue); }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }

        .loader {
            display: none;
            text-align: center;
            color: var(--neon-green);
            margin: 20px;
            font-size: 0.8rem;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    </style>
</head>
<body>

<div class="scanline"></div>

<header>
    <div class="brand">QUANTUM_NEXUS // V3.1</div>
    <div style="font-size: 0.7rem; opacity: 0.5;">ENCRYPTION: ACTIVE</div>
</header>

<div class="hud-container">
    <div class="input-group">
        <input id="target-url" placeholder=">> ENTER SOURCE URL FOR DEEP PACKET INSPECTION...">
        <button class="btn-initiate" onclick="runExtraction()">INITIATE SCAN</button>
    </div>

    <div class="loader" id="status-text">INTERCEPTING DATA PACKETS...</div>

    <div class="dashboard" id="dashboard" style="display: none;">
        <div class="side-panel">
            <div class="panel-label">Source Info</div>
            <h2>[01] METADATA_EXTRACT</h2>
            <div id="meta-results"></div>
        </div>

        <div class="main-view">
            <div class="panel-label">Content Stream</div>
            <h2>[02] DOM_TEXT_PAYLOAD</h2>
            <div id="text-results" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; font-size: 0.8rem; line-height: 1.6; color: #8b9bb2;"></div>

            <h2>[03] MEDIA_RESOURCES</h2>
            <div class="image-stream" id="image-results"></div>
            
            <div style="margin-top: 30px;">
                <a id="dl-btn" href="#" style="background: var(--neon-green); color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; font-size: 0.8rem; border-radius: 2px;">COMPILE & DOWNLOAD (.ZIP)</a>
            </div>
        </div>
    </div>

    <div class="console-log" id="console">
        <div class="log-entry">SYSTEM READY. AWAITING INSTRUCTIONS...</div>
    </div>
</div>

<script>
    function addLog(text, type) {
        const log = document.getElementById('console');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
    }

    async function runExtraction() {
        const url = document.getElementById("target-url").value;
        if (!url) {
            addLog("CRITICAL ERROR: No Target URL defined.", "process");
            return;
        }

        // UI Reset
        document.getElementById("status-text").style.display = "block";
        document.getElementById("dashboard").style.display = "none";
        addLog(`Initiating handshake with ${url}...`, "process");

        try {
            const response = await fetch('/scrape_all', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await response.json();

            if (data.error) throw new Error(data.error);

            // Populate Metadata
            document.getElementById("meta-results").innerHTML = `
                <div class="data-item"><span class="label">PAGE:</span> ${data.contact_page || 'Root'}</div>
                <div class="data-item"><span class="label">EMAILS:</span> ${data.emails.join(", ") || 'None'}</div>
                <div class="data-item"><span class="label">PHONES:</span> ${data.phones.join(", ") || 'None'}</div>
                <div class="data-item"><span class="label">GMAIL_DETECT:</span> ${data.gmail_only.length > 0 ? 'YES' : 'NO'}</div>
            `;

            // Populate Text
            document.getElementById("text-results").innerText = data.text;

            // Populate Images
            document.getElementById("image-results").innerHTML = data.images.map(img => `<img src="${img}">`).join('');

            // Show Dashboard
            document.getElementById("status-text").style.display = "none";
            document.getElementById("dashboard").style.display = "grid";
            addLog("Extraction successful. Payload ready.", "success");

        } catch (err) {
            document.getElementById("status-text").style.display = "none";
            addLog(`FAILURE: ${err.message}`, "process");
        }
    }
</script>

</body>
</html>
