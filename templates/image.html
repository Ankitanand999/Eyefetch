<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Labs | Dynamic Image Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --glass-base: rgba(15, 15, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #00d2ff; /* Cyber Blue */
            --accent-secondary: #3a7bd5;
            --accent-success: #00ff9d;
            --text-main: #f0f0f0;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- Animated Mesh Background --- */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(58, 123, 213, 0.15) 0px, transparent 50%);
            filter: blur(80px);
        }

        .container {
            max-width: 1100px;
            width: 90%;
            margin: 60px 0;
            padding: 50px;
            background: var(--glass-base);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* --- Input Section --- */
        .input-group {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .input-group:focus-within {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 25px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button#scrapeButton {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #fff;
            border: none;
            padding: 0 35px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        button#scrapeButton:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* --- Status & Progress --- */
        .status-container {
            margin-bottom: 30px;
            text-align: center;
        }

        #progressWrapper {
            display: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-success));
            transition: width 0.5s ease;
        }

        /* --- Results Grid --- */
        #imageGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .image-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.07);
        }

        .image-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 1px solid var(--glass-border);
        }

        .image-card .info {
            padding: 12px;
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Download Module --- */
        .download-buttons {
            display: none;
            justify-content: center;
            gap: 15px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px dashed var(--glass-border);
        }

        .btn-download {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-zip { background: var(--accent-success); color: #000; }
        .btn-csv { background: rgba(255, 255, 255, 0.1); color: #fff; }
        
        .btn-download:hover { transform: translateY(-2px); filter: brightness(1.1); }

    </style>
</head>
<body>

<div class="mesh-bg"></div>

<div class="container">
    <header>
        <h1>Neural Scraper <small style="font-size: 0.4em; vertical-align: middle; opacity: 0.6;">v2.0</small></h1>
        <p class="subtitle">Extract dynamic visual assets with headless browser precision.</p>
    </header>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Enter target URL (e.g., https://unsplash.com)">
        <button id="scrapeButton" onclick="fetchImages()">Run Extraction</button>
    </div>

    <div class="status-container">
        <div id="resultsArea" style="font-size: 0.9rem; color: var(--text-dim);">
            Ready for deployment. Standing by.
        </div>
        <div id="progressWrapper">
            <div id="progressBar"></div>
        </div>
    </div>

    <div class="download-buttons" id="downloadButtons">
        <a id="downloadCSV" class="btn-download btn-csv" href="#">Export URLs (CSV)</a>
        <a id="downloadImages" class="btn-download btn-zip" href="#">Download Assets (ZIP)</a>
    </div>

    <div id="imageGrid">
        </div>
</div>

<script>
    // Integration logic remains similar to your original script
    // but with updated UI target selectors.
    async function fetchImages() {
        const urlInput = document.getElementById('urlInput');
        const scrapeButton = document.getElementById('scrapeButton');
        const resultsArea = document.getElementById('resultsArea');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const imageGrid = document.getElementById('imageGrid');
        const downloadButtons = document.getElementById('downloadButtons');

        if (!urlInput.value) return;

        // UI Reset
        scrapeButton.disabled = true;
        scrapeButton.innerText = "Processing...";
        progressWrapper.style.display = "block";
        progressBar.style.width = "20%";
        resultsArea.innerText = "Initializing headless environment...";
        imageGrid.innerHTML = "";
        downloadButtons.style.display = "none";

        try {
            // Simulated fetch (Replace with your Flask API call)
            const response = await fetch('/get_images', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput.value })
            });
            const data = await response.json();

            progressBar.style.width = "100%";
            resultsArea.innerHTML = `<span style="color:var(--accent-success)">Extraction complete. Found ${data.images.length} images.</span>`;
            
            // Show Downloads
            downloadButtons.style.display = "flex";
            document.getElementById('downloadCSV').href = data.csv;
            document.getElementById('downloadImages').href = data.images_zip;

            // Render Preview Cards
            data.images.slice(0, 12).forEach(src => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${src}" loading="lazy">
                    <div class="info">${src.split('/').pop()}</div>
                `;
                imageGrid.appendChild(card);
            });

        } catch (err) {
            resultsArea.innerHTML = `<span style="color:#ff4d4d">CRITICAL ERROR: System Offline</span>`;
        } finally {
            scrapeButton.disabled = false;
            scrapeButton.innerText = "Run Extraction";
            setTimeout(() => { progressWrapper.style.display = "none"; }, 1000);
        }
    }
</script>

</body>
</html>
